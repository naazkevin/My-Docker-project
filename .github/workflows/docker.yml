name: Build, Push & Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/node-app:latest \
          -t ${{ secrets.DOCKER_USERNAME }}/node-app:${{ github.sha }} \
          --build-arg VERSION=${{ github.sha }} .

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/node-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/node-app:latest

      # ✅ ONLY THIS for deploy
      - name: Trigger Render Deploy
        run: |
          echo "Triggering deploy..."
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

      # ✅ Wait for deployment
      - name: Wait for new version
        run: |
          echo "Waiting for new version..."

          for i in {1..20}
          do
            VERSION=$(curl -s https://node-app-latest-ou2v.onrender.com/version)
            echo "Current: $VERSION"

            if [[ "$VERSION" == *"${{ github.sha }}"* ]]; then
              echo "New version is live!"
              exit 0
            fi

            sleep 5
          done

          echo "New version did NOT come live"
          exit 1

      # ✅ Health check
      - name: Health Check
        run: |
          echo "Checking health..."

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://node-app-latest-ou2v.onrender.com/health)

          if [ "$STATUS" -ne 200 ]; then
            echo "Health check failed!"
            exit 1
          else
            echo "App is healthy ✅"
          fi